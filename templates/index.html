<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Gesture Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1;
            --accent: #22d3ee;
            --success: #22c55e;
            --dark: #09090b;
            --surface: #18181b;
            --surface2: #27272a;
            --text: #fafafa;
            --text2: #a1a1aa;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
        }
        
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 16px 32px;
            background: rgba(9, 9, 11, 0.9);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            gap: 14px;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }
        .header h1 {
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .header h1 span {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .container {
            margin-top: 90px;
            padding: 24px;
            display: flex;
            justify-content: center;
            gap: 28px;
            flex-wrap: wrap;
        }
        
        .video-container {
            background: var(--surface);
            border-radius: 20px;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .video-container h3 {
            font-size: 0.75rem;
            color: var(--text2);
            font-weight: 500;
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .video-wrapper {
            position: relative;
            width: 560px;
            height: 420px;
            border-radius: 14px;
            overflow: hidden;
            background: #000;
        }
        #webcam {
            width: 560px;
            height: 420px;
            object-fit: cover;
        }
        
        .action-badge {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 12px 32px;
            border-radius: 12px;
            border: 2px solid var(--accent);
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .action-badge .label {
            font-size: 0.6rem;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }
        .action-badge .action {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }
        
        .sidebar {
            width: 260px;
        }
        
        .card {
            background: var(--surface);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 16px;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        .status-dot {
            width: 10px; height: 10px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--success); }
            50% { opacity: 0.6; }
        }
        .status-text {
            font-size: 0.85rem;
            color: var(--success);
            font-weight: 500;
        }
        
        .btn {
            width: 100%;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3); }
        .btn.active { background: linear-gradient(135deg, var(--success), #16a34a); }
        
        .gestures h3 {
            font-size: 0.7rem;
            color: var(--text2);
            font-weight: 500;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .gest-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            margin-bottom: 6px;
            background: var(--surface2);
            border-radius: 10px;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .gest-item span:first-child { color: var(--text2); }
        .gest-item span:last-child { color: var(--text); font-weight: 500; }
        .gest-item.active {
            background: rgba(34, 211, 238, 0.1);
            border: 1px solid var(--accent);
        }
        .gest-item.active span:last-child { color: var(--accent); }
        
        @media (max-width: 768px) {
            .container { flex-direction: column; align-items: center; }
            .video-wrapper, #webcam { width: 100%; max-width: 360px; height: 270px; }
            .sidebar { width: 100%; max-width: 360px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">🖐️</div>
        <h1>Hand <span>Gesture</span> Control</h1>
    </header>

    <main class="container">
        <div class="video-container">
            <h3>Live Camera Feed</h3>
            <div class="video-wrapper">
                <img id="webcam" src="/video_feed" alt="Camera">
                <div class="action-badge">
                    <div class="label">Detected</div>
                    <div class="action" id="gestureName">WAITING...</div>
                </div>
            </div>
        </div>
        
        <div class="sidebar">
            <div class="card">
                <div class="status">
                    <div class="status-dot"></div>
                    <div class="status-text">System Active</div>
                </div>
                <button class="btn" id="mouseBtn" onclick="toggleMouse()">
                    🖱️ Enable Mouse Control
                </button>
            </div>
            
            <div class="card gestures">
                <h3>Available Gestures</h3>
                <div class="gest-item" data-action="MOVE"><span>✌️ Index</span><span>Move Mouse</span></div>
                <div class="gest-item" data-action="LEFT CLICK"><span>🖕 Middle</span><span>Left Click</span></div>
                <div class="gest-item" data-action="RIGHT CLICK"><span>✌️🖕</span><span>Right Click</span></div>
                <div class="gest-item" data-action="DOUBLE CLICK"><span>✌️🖕🫱</span><span>Double Click</span></div>
                <div class="gest-item" data-action="VOLUME UP"><span>🖐️ All 4</span><span>Volume Up</span></div>
                <div class="gest-item" data-action="VOLUME DOWN"><span>👈 Pinky</span><span>Volume Down</span></div>
                <div class="gest-item" data-action="MUTE"><span>🖕✌️👈</span><span>Mute</span></div>
            </div>
        </div>
    </main>

    <script>
        const gestureName = document.getElementById('gestureName');
        const gestureItems = document.querySelectorAll('.gest-item');
        const mouseBtn = document.getElementById('mouseBtn');
        let mouseEnabled = false;
        
        const labels = {
            'MOVE': 'Move Mouse',
            'LEFT CLICK': 'Left Click',
            'RIGHT CLICK': 'Right Click',
            'DOUBLE CLICK': 'Double Click',
            'VOLUME UP': 'Volume Up',
            'VOLUME DOWN': 'Volume Down',
            'MUTE': 'Mute'
        };

        function update() {
            fetch('/get_action')
                .then(r => r.json())
                .then(data => {
                    const action = data.action || 'NONE';
                    if (action && action !== 'NONE') {
                        gestureName.textContent = labels[action] || action;
                        highlight(action);
                    } else {
                        gestureName.textContent = 'WAITING...';
                        clear();
                    }
                });
        }

        function highlight(action) {
            clear();
            gestureItems.forEach(item => {
                if (item.dataset.action === action || action.includes(item.dataset.action)) {
                    item.classList.add('active');
                }
            });
        }

        function clear() {
            gestureItems.forEach(item => item.classList.remove('active'));
        }

        function toggleMouse() {
            mouseEnabled = !mouseEnabled;
            const endpoint = mouseEnabled ? '/enable_control' : '/disable_control';
            fetch(endpoint, { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    if (mouseEnabled) {
                        mouseBtn.textContent = '✓ Mouse Control ON';
                        mouseBtn.classList.add('active');
                    } else {
                        mouseBtn.textContent = '🖱️ Enable Mouse Control';
                        mouseBtn.classList.remove('active');
                    }
                });
        }

        setInterval(update, 80);
    </script>
</body>
</html>
